<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feather Engine — Panel</title>
  <style>
    /* ── Reset ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--color-bg-base, #09090b);
      color: var(--color-text-primary, #fafafa);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
    }

    /* ── Popout layout ─────────────────────────────────── */
    .popout-root {
      display: flex;
      flex-direction: column;
      width: 100%; height: 100%;
    }

    /* Custom title-bar header (draggable via startDragging) */
    .popout-header {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      min-height: 36px;
      padding: 0 10px;
      background: var(--color-bg-elevated, #1c1c1f);
      border-bottom: 1px solid var(--color-border-default, #27272a);
      user-select: none;
      cursor: grab;
    }
    .popout-header:active { cursor: grabbing; }

    .popout-title {
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
      color: var(--color-text-primary, #fafafa);
    }

    .popout-pill {
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 2px 6px;
      border-radius: 4px;
      background: rgba(59,130,246,0.15);
      color: rgba(59,130,246,0.9);
    }

    .popout-redock-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--color-border-default, #27272a);
      border-radius: 4px;
      background: var(--color-bg-overlay, #2e2e32);
      color: var(--color-text-secondary, #a1a1aa);
      font-size: 11px;
      font-family: inherit;
      cursor: pointer;
      transition: background 120ms, color 120ms, border-color 120ms;
    }
    .popout-redock-btn:hover {
      background: var(--color-blue, #3b82f6);
      color: #fff;
      border-color: var(--color-blue, #3b82f6);
    }

    .popout-content {
      flex: 1;
      overflow: auto;
      position: relative;
    }

    /* ── Empty-state placeholder ───────────────────────── */
    .popout-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      height: 100%;
      opacity: 0.4;
      text-align: center;
    }
    .popout-loading-icon { font-size: 36px; }
    .popout-loading-text { font-size: 13px; }
  </style>
</head>
<body>
  <div class="popout-root">
    <!-- Header -->
    <div class="popout-header" id="popout-header">
      <span class="popout-pill">Detached</span>
      <span class="popout-title" id="popout-title">Panel</span>
      <button class="popout-redock-btn" id="popout-redock">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="2"/>
          <line x1="9" y1="2" x2="9" y2="22"/>
        </svg>
        Re-dock
      </button>
    </div>

    <!-- Panel content area -->
    <div class="popout-content" id="popout-content">
      <div class="popout-loading">
        <div class="popout-loading-icon">⬛</div>
        <div class="popout-loading-text">Connecting to main editor…</div>
      </div>
    </div>
  </div>

  <script type="module" src="/src/popout-entry.ts"></script>
</body>
</html>
